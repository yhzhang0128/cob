# Geo-location of all machines
locations = ["us-west", "eu-west", "au", "us-west", "eu-west", "au"]

# Binaries for envtest
#   format: ["local client binary pathname",
#            "local server binary pathname",
#            "remote directory"]
binaries = ["/opt/chance/cob/target/debug/envtest_client", "/opt/chance/cob/target/debug/envtest_server", "/opt/chance/target_binary/"]