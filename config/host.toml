# Hostname and geo-locationof all machines
hostnames = ["host0",   "host1",   "host2",   "host3", "host4",   "host5",   "host6",   "host7", ]
locations = ["eu-west", "us-east", "us-west", "au"   , "eu-west", "us-east", "us-west", "au"]

# Envtest files and directories
build = ["script/build_envtest.sh"]
log-dir = ["/users/Yunhao/log/"]
local-dir = ["/opt/chance/cob/target/debug/", "/opt/chance/cob/config/"]
remote-dir = ["/opt/chance/target_binary/", "/opt/chance/target_config/"]

config-files = ["host.toml", "latency.toml"]
binary-files = ["envtest_client", "envtest_server"]

client-args = ["--host", "/opt/chance/target_config/host"]
server-args = ["--host", "/opt/chance/target_config/host"]

client-hosts = ["host4", "host5", "host6", "host7"]
server-hosts = ["host0", "host1", "host2", "host3"]
server-ports = ["10000", "10000", "10000", "10000"]
