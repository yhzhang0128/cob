# Hostname of all machines
hostnames = ["client0", "client1", "client2", "server0", "server1", "server2"]

# Geo-location of all machines
locations = ["us-west", "eu-west", "au", "us-west", "eu-west", "au"]

# Envtest binaries
#   format: ["local client binary path",    #0
#            "client binary name",          #1
#            "local server binary path",    #2
#            "server binary name"           #3
#            "remote path"]                 #4
binaries = ["/opt/chance/cob/target/debug/",
            "envtest_client",
            "/opt/chance/cob/target/debug/",
            "envtest_server",
            "/opt/chance/target_binary/"]
servers = ["server0", "server1", "server2"]
clients = ["client0", "client0", "client1", "client1", "client2", "client2"]
